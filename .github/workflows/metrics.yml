name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Runs daily
  workflow_dispatch: # Allows manual run
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # General configuration
          user: fallofpheonix
          template: terminal # High-tech CS look
          base: header, metadata # No 'repositories' or 'community' blocks
          
          # Computer Science Connection
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_habits: yes # Shows coding habits (CS dedication)
          plugin_habits_charts: yes
          
          # Strong Quotes (Introduction Plugin)
          plugin_introduction: yes
          plugin_introduction_title: yes
          plugin_introduction_text: |
            "Power comes in response to a need, not a desire. You have to create that need." — Son Goku
            "Even a low-class warrior can surpass an elite if he earns it through hard work." — Son Goku
            "The limits only exist if you let them." — Son Goku
            "Push through the pain. Giving up hurts more." — Son Goku
          
          # Anime Connection (AniList Plugin)
          plugin_anilist: yes
          plugin_anilist_user: fallofpheonix
          plugin_anilist_sections: favorites, characters
          plugin_anilist_limit: 4
          
          # Visual Flair
          plugin_skyline: yes
          plugin_skyline_year: 2024
          plugin_skyline_frames: 60
