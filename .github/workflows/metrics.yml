name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Runs daily
  workflow_dispatch: # Allows manual run
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # General configuration
          user: fallofpheonix
          template: terminal # High-tech CS look
          base: header, metadata # No 'repositories' or 'community' blocks
          
          # Computer Science Connection
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_habits: yes # Shows coding habits (CS dedication)
          plugin_habits_charts: yes
          
          # Strong Quotes (Introduction Plugin)
          plugin_introduction: yes
          plugin_introduction_title: yes
          plugin_introduction_text: |
            "Talk is cheap. Show me the code." — Linus Torvalds
            "First, solve the problem. Then, write the code." — John Johnson
            "The only way to go fast, is to go well." — Robert C. Martin
            "If you don't like your destiny, don't accept it. Have the courage to change it!" — Naruto Uzumaki
          
          # Anime Connection (AniList Plugin)
          plugin_anilist: yes
          plugin_anilist_user: fallofpheonix
          plugin_anilist_sections: favorites, characters
          plugin_anilist_limit: 4
          
          # Visual Flair
          plugin_skyline: yes
          plugin_skyline_year: 2024
          plugin_skyline_frames: 60
